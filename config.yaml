threads:
  access_token: "${THREADS_ACCESS_TOKEN}"
  keywords:
    - AI
    - LLM
    - Claude
    - GPT
    - Agent
    - automation
    - coding
    - 科技趨勢
  sort: "TOP"
  max_posts_per_keyword: 25

anthropic:
  model: "claude-sonnet-4-6"
  max_tokens: 2048

insights:
  data_dir: "./data"
  db_name: "threads.db"
  backfill_days: 30
  timezone: "Asia/Taipei"

output:
  directory: "./output/threads_reports"

advisor:
  plan:
    stage2_model: sonnet  # Stage 2 骨架生成模型；可被 CLI --model 覆寫
    stage1_model: haiku   # Stage 1 框架選擇模型（分類任務）
    default_style_posts: 3
    default_format: thread
