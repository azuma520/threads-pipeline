threads:
  access_token: "${THREADS_ACCESS_TOKEN}"
  keywords:
    - AI
    - LLM
    - Claude
    - GPT
    - Agent
    - automation
    - coding
    - 科技趨勢
  sort: "TOP"
  max_posts_per_keyword: 25

anthropic:
  model: "claude-sonnet-4-6"
  max_tokens: 2048

insights:
  data_dir: "./data"
  db_name: "threads.db"
  backfill_days: 30
  timezone: "Asia/Taipei"

output:
  directory: "./output/threads_reports"
